name: Release

on:
  # Triggers the workflow on push events but only for tags with the "v" prefix
  push:
    tags:
      - 'v*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0) - creates a release if provided'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          git tag "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Build artifact
        run: dotnet publish ClaudeWorkspacePicker/ClaudeWorkspacePicker.csproj -r win-x64 --self-contained -p:PublishSingleFile=true -c Release

      - name: Create release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: ClaudeWorkspacePicker/bin/Release/net10.0/win-x64/publish/ClaudeWorkspacePicker.exe

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
        uses: actions/upload-artifact@v7
        with:
          name: ClaudeWorkspacePicker
          path: ClaudeWorkspacePicker/bin/Release/net10.0/win-x64/publish/ClaudeWorkspacePicker.exe
