name: Release

on:
  # Triggers the workflow on push events but only for tags with the "v" prefix
  push:
    tags:
      - 'v*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0) - creates a release if provided'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          git tag "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Build all artifacts
        run: |
          mkdir -p artifacts
          for rid in win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish ClaudeWorkspacePicker/ClaudeWorkspacePicker.csproj \
              -r $rid --self-contained -p:PublishSingleFile=true -c Release
            if [[ $rid == win-* ]]; then
              cp "ClaudeWorkspacePicker/bin/Release/net10.0/$rid/publish/ClaudeWorkspacePicker.exe" \
                 "artifacts/ClaudeWorkspacePicker-$rid.exe"
            else
              cp "ClaudeWorkspacePicker/bin/Release/net10.0/$rid/publish/ClaudeWorkspacePicker" \
                 "artifacts/ClaudeWorkspacePicker-$rid"
            fi
          done

      - name: Create release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/ClaudeWorkspacePicker-*

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
        uses: actions/upload-artifact@v7
        with:
          name: ClaudeWorkspacePicker
          path: artifacts/
